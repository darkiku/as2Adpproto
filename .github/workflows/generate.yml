Set-Content -Path ".github\workflows\generate.yml" -Value 'name: Generate proto

on:
  push:
    branches: [main, master]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: install buf
        uses: bufbuild/buf-setup-action@v1

      - name: install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: generate
        run: buf generate

      - name: push to generated repo
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone https://x-access-token:${{ secrets.GEN_TOKEN }}@github.com/darkiku/ass2Adpgen.git gen-repo
          cp -r payment gen-repo/
          cp -r order gen-repo/
          cd gen-repo
          go mod init github.com/darkiku/ass2Adpgen || true
          git add .
          git commit -m "generated from proto" || true
          git push'